<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>SpeakNote</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#1a1a2e; color:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; user-select:none; }
#btn { width:80px; height:80px; border-radius:50%; border:none; cursor:pointer; color:#fff; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
#btn.idle { background:linear-gradient(135deg,#667eea,#764ba2); }
#btn.idle:hover { transform:scale(1.05); box-shadow:0 0 20px rgba(102,126,234,0.5); }
#btn.listening { background:#e74c3c; animation:pulse 1s infinite; box-shadow:0 0 30px rgba(231,76,60,0.6); }
#btn.processing { background:#f39c12; cursor:wait; }
#btn.idle.chat-mode { background:linear-gradient(135deg,#3498db,#2980b9); }
#btn.idle.chat-mode:hover { box-shadow:0 0 20px rgba(52,152,219,0.5); }
#btn.speaking { background:#2ecc71; animation:pulse 1.5s infinite; box-shadow:0 0 30px rgba(46,204,113,0.6); }
#status { margin-top:12px; font-size:12px; color:#888; }
#preview { margin-top:8px; font-size:11px; color:#aaa; max-width:280px; text-align:center; word-break:break-all; min-height:16px; }
#lastOutput { margin-top:8px; max-width:280px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px; display:none; }
#lastOutput.show { display:block; }
#lastOutputLabel { font-size:9px; color:#7c8aa8; margin-bottom:4px; letter-spacing:0.5px; }
#lastOutputText { font-size:11px; color:#cfd8e6; max-height:60px; overflow-y:auto; white-space:pre-wrap; word-break:break-word; line-height:1.4; }
#lastOutputActions { display:flex; gap:4px; margin-top:6px; }
#lastOutputActions button { flex:1; background:rgba(102,126,234,0.2); border:1px solid rgba(102,126,234,0.4); color:#b0c4ff; padding:4px 6px; border-radius:6px; cursor:pointer; font-size:10px; }
#lastOutputActions button:hover { background:rgba(102,126,234,0.35); }
#conn { position:absolute; top:8px; right:8px; width:8px; height:8px; border-radius:50%; background:#e74c3c; }
#conn.ok { background:#2ecc71; }

/* Settings panel */
#settings { margin-top:14px; width:260px; }
.setting-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.06);
}
.setting-label { font-size:11px; color:#aaa; }
.toggle { position:relative; width:36px; height:20px; cursor:pointer; }
.toggle input { display:none; }
.toggle .slider {
  position:absolute; inset:0; background:#444; border-radius:10px; transition:0.2s;
}
.toggle .slider:before {
  content:''; position:absolute; width:16px; height:16px; left:2px; top:2px;
  background:#fff; border-radius:50%; transition:0.2s;
}
.toggle input:checked + .slider { background:#667eea; }
.toggle input:checked + .slider:before { transform:translateX(16px); }

/* Action buttons */
#actions { display:flex; gap:6px; margin-top:10px; }
#actions button {
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  color:#ccc; font-size:10px; padding:4px 10px; border-radius:12px; cursor:pointer; transition:all 0.2s;
}
#actions button:hover { background:rgba(255,255,255,0.15); color:#fff; }

#shortcuts { margin-top:10px; font-size:9px; color:#555; text-align:center; line-height:1.6; }
#shortcuts span { color:#777; }

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* Mode toggle */
#modeToggle { position:absolute; top:8px; left:8px; font-size:10px; padding:3px 8px; border-radius:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#aaa; cursor:pointer; transition:all 0.2s; }
#modeToggle.chat { background:rgba(52,152,219,0.3); color:#3498db; border-color:rgba(52,152,219,0.5); }

/* Chat log */
#chatLog { width:270px; max-height:140px; overflow-y:auto; margin-top:8px; font-size:11px; display:none; }
#chatLog.show { display:block; }
.chat-msg { padding:4px 8px; margin:2px 0; border-radius:8px; line-height:1.4; }
.chat-msg.user { background:rgba(102,126,234,0.2); color:#b0c4ff; text-align:right; }
.chat-msg.assistant { background:rgba(255,255,255,0.08); color:#ccc; }

/* Dictionary modal */
#dictModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
#dictModal.show { display:flex; }
.dict-panel { background:#2a2a4a; border-radius:12px; padding:16px; width:270px; max-height:70vh; overflow-y:auto; }
</style>
</head>
<body>
<div id="modeToggle" onclick="ensureAudioContexts(); toggleChatMode()">整形</div>
<div id="conn"></div>
<button id="btn" class="idle" onclick="ensureAudioContexts(); toggleRecord()">
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" x2="12" y1="19" y2="22"/>
  </svg>
</button>
<div id="status">接続中...</div>
<div id="preview"></div>

<!-- 最後の文字起こし結果（消失防止のため常時表示） -->
<div id="lastOutput">
  <div id="lastOutputLabel">📝 最後の出力</div>
  <div id="lastOutputText"></div>
  <div id="lastOutputActions">
    <button onclick="copyLastOutput()">📋 コピー</button>
    <button onclick="rePasteLastOutput()">🔁 再貼り付け</button>
  </div>
</div>

<!-- 初回オンボーディング -->
<div id="chatLog"></div>

<!-- Settings -->
<div id="settings">
  <div class="setting-row">
    <span class="setting-label">AI整形</span>
    <label class="toggle"><input type="checkbox" id="chkAI" checked onchange="toggleAI()"><span class="slider"></span></label>
  </div>
  <div class="setting-row">
    <span class="setting-label">自動学習</span>
    <label class="toggle"><input type="checkbox" id="chkLearn" onchange="toggleLearn()"><span class="slider"></span></label>
  </div>
</div>

<div id="actions">
  <button onclick="saveToKeep()">Keep保存</button>
  <button onclick="openDict()">辞書</button>
  <button id="btnClearChat" onclick="clearChat()" style="display:none;">会話クリア</button>
</div>

<div id="shortcuts">
  <span>Alt</span>=録音 / <span>F8</span>=会話切替 / <span>F9</span>=トグル<br>
  <span>F10</span>=Keep / <span>F11</span>=AI切替 / <span>F12</span>=辞書登録
</div>

<!-- Dictionary modal -->
<div id="dictModal">
  <div class="dict-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span style="font-size:13px; font-weight:bold;">ユーザー辞書</span>
      <button onclick="closeDict()" style="background:none; border:none; color:#888; cursor:pointer; font-size:16px;">✕</button>
    </div>
    <div style="display:flex; gap:4px; margin-bottom:8px;">
      <input id="dictFrom" placeholder="誤変換" style="flex:1; background:#1a1a2e; border:1px solid #444; color:#fff; padding:4px 6px; border-radius:6px; font-size:11px;">
      <span style="color:#666; line-height:28px;">→</span>
      <input id="dictTo" placeholder="正しい表記" style="flex:1; background:#1a1a2e; border:1px solid #444; color:#fff; padding:4px 6px; border-radius:6px; font-size:11px;">
      <button onclick="addDictEntry()" style="background:#667eea; border:none; color:#fff; padding:4px 8px; border-radius:6px; cursor:pointer; font-size:11px;">追加</button>
    </div>
    <div id="dictList" style="font-size:10px; color:#aaa;"></div>
  </div>
</div>

<script>
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const connEl = document.getElementById('conn');
const chkAI = document.getElementById('chkAI');
const chkLearn = document.getElementById('chkLearn');

let ws = null;
let rec = null;
let isListening = false;
let accumulated = '';
let aiEnabled = true;
let autoLearnEnabled = JSON.parse(localStorage.getItem('speaknote_autolearn') || 'false');
let lastResult = '';
let hintCount = parseInt(localStorage.getItem('speaknote_hint_count') || '0');
let chatMode = false;
const chatLogEl = document.getElementById('chatLog');
const modeToggleEl = document.getElementById('modeToggle');
const btnClearChat = document.getElementById('btnClearChat');

// Init toggle states
chkLearn.checked = autoLearnEnabled;

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
let audioUnlocked = false;
function ensureAudioContexts() {
  ensureAudio();
  if (!audioUnlocked) {
    // Play silent audio to unlock autoplay
    elevenPlayer.src = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYlPEajAAAAAAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYlPEajAAAAAAAAAAAAAAAAAAAA';
    elevenPlayer.play().then(() => { elevenPlayer.pause(); elevenPlayer.currentTime = 0; audioUnlocked = true; }).catch(() => {});
  }
}
function playTone(freq, dur) {
  const ctx = ensureAudio();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.value = freq;
  gain.gain.value = 0.3;
  gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + dur);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur);
}
function playStart() { }
function playStop() { }

// --- TTS ---
let cachedVoice = null;
function getBestJaVoice() {
  if (cachedVoice) return cachedVoice;
  const voices = speechSynthesis.getVoices();
  // Priority: Natural/Online voices (Nanami) > Ayumi > Haruka > any ja
  const priority = [
    v => /nanami/i.test(v.name) && /online|natural/i.test(v.name),
    v => /nanami/i.test(v.name),
    v => /online|natural/i.test(v.name) && v.lang.startsWith('ja'),
    v => /ayumi/i.test(v.name),
    v => /haruka/i.test(v.name),
    v => v.lang.startsWith('ja'),
  ];
  for (const test of priority) {
    const found = voices.find(test);
    if (found) { cachedVoice = found; console.log('[TTS] Voice:', found.name); return found; }
  }
  return null;
}
function speakTTS(text) {
  return new Promise((resolve) => {
    if (!window.speechSynthesis) { resolve(); return; }
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'ja-JP';
    utter.rate = 1.0;   // natural pace
    utter.pitch = 1.05;  // slightly warm
    utter.volume = 1.0;
    const voice = getBestJaVoice();
    if (voice) utter.voice = voice;
    utter.onend = () => { btn.className = chatMode ? 'idle chat-mode' : 'idle'; statusEl.textContent = '会話モード: Alt=話す'; resolve(); };
    utter.onerror = () => { btn.className = chatMode ? 'idle chat-mode' : 'idle'; resolve(); };
    btn.className = 'speaking';
    statusEl.textContent = '読み上げ中...';
    speechSynthesis.speak(utter);
  });
}
function stopTTS() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  elevenPlayer.pause(); elevenPlayer.currentTime = 0;
  btn.className = chatMode ? 'idle chat-mode' : 'idle';
}
// --- ElevenLabs Audio ---
let elevenAudioCtx = null;
let elevenAudio = null;
// Hidden audio element for reliable playback
const elevenPlayer = document.createElement('audio');
elevenPlayer.id = 'elevenPlayer';
document.body.appendChild(elevenPlayer);

function playElevenLabsAudio(url) {
  stopTTS();
  wsSend({ type: 'debug', msg: 'ElevenLabs play: ' + url });
  btn.className = 'speaking';
  statusEl.textContent = '読み上げ中...';
  elevenPlayer.src = url;
  elevenPlayer.onplay = () => { wsSend({ type: 'debug', msg: 'ElevenLabs: playing' }); };
  elevenPlayer.onended = () => {
    wsSend({ type: 'debug', msg: 'ElevenLabs: ended' });
    btn.className = chatMode ? 'idle chat-mode' : 'idle';
    statusEl.textContent = '会話モード: Alt=話す';
  };
  elevenPlayer.onerror = (e) => {
    wsSend({ type: 'debug', msg: 'ElevenLabs player error: ' + (elevenPlayer.error?.message || 'unknown') });
    btn.className = chatMode ? 'idle chat-mode' : 'idle';
    speakTTS(previewEl.textContent);
  };
  elevenPlayer.play().catch(err => {
    wsSend({ type: 'debug', msg: 'ElevenLabs play() catch: ' + err.message });
    // Fallback to browser TTS
    speakTTS(previewEl.textContent);
  });
}
// Preload voices (Edge loads them async)
if (window.speechSynthesis) {
  speechSynthesis.onvoiceschanged = () => { cachedVoice = null; getBestJaVoice(); };
  getBestJaVoice();
}

// --- Chat mode ---
function toggleChatMode() {
  chatMode = !chatMode;
  updateChatModeUI();
  wsSend({ type: 'setting', key: 'chatMode', value: chatMode });
}
function updateChatModeUI() {
  modeToggleEl.textContent = chatMode ? '会話' : '整形';
  modeToggleEl.className = chatMode ? 'chat' : '';
  chatLogEl.className = chatMode ? 'show' : '';
  btnClearChat.style.display = chatMode ? '' : 'none';
  if (!isListening) {
    btn.className = chatMode ? 'idle chat-mode' : 'idle';
    statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
  }
}
function appendChatLog(role, text) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.textContent = (role === 'user' ? '' : '') + text;
  chatLogEl.appendChild(div);
  chatLogEl.scrollTop = chatLogEl.scrollHeight;
}
function clearChat() {
  chatLogEl.innerHTML = '';
  wsSend({ type: 'chat_clear' });
  statusEl.textContent = '会話履歴クリア';
  setTimeout(() => { statusEl.textContent = '会話モード: Alt=話す'; }, 1500);
}

// --- Settings ---
function toggleAI() {
  aiEnabled = chkAI.checked;
  wsSend({ type: 'setting', key: 'aiEnabled', value: aiEnabled });
  statusEl.textContent = aiEnabled ? 'AI整形ON' : 'AI整形OFF（そのまま出力）';
  setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 1500);
}

function toggleLearn() {
  autoLearnEnabled = chkLearn.checked;
  localStorage.setItem('speaknote_autolearn', JSON.stringify(autoLearnEnabled));
  wsSend({ type: 'setting', key: 'autoLearnEnabled', value: autoLearnEnabled });
  statusEl.textContent = autoLearnEnabled ? '自動学習ON' : '自動学習OFF';
  setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 1500);
}

// --- Hint after paste (first 5 times) ---
function showPasteHint() {
  if (hintCount < 5) {
    hintCount++;
    localStorage.setItem('speaknote_hint_count', String(hintCount));
    statusEl.textContent = '貼り付け完了! (修正したらF12で学習)';
  } else {
    statusEl.textContent = '貼り付け完了!';
  }
  previewEl.textContent = '';
  setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 3000);
}

// --- Google Keep ---
function saveToKeep() {
  if (!lastResult) {
    statusEl.textContent = 'テキストなし（先に音声入力してください）';
    setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 1500);
    return;
  }
  wsSend({ type: 'keep_save', text: lastResult });
  statusEl.textContent = 'Keep保存中...';
}

// --- User Dictionary ---
let userDict = JSON.parse(localStorage.getItem('speaknote_dict') || '[]');

function openDict() { document.getElementById('dictModal').className = 'show'; renderDict(); }
function closeDict() { document.getElementById('dictModal').className = ''; }
function addDictEntry() {
  const from = document.getElementById('dictFrom').value.trim();
  const to = document.getElementById('dictTo').value.trim();
  if (!from || !to) return;
  userDict = userDict.filter(e => e.from !== from);
  userDict.push({ from, to });
  localStorage.setItem('speaknote_dict', JSON.stringify(userDict));
  document.getElementById('dictFrom').value = '';
  document.getElementById('dictTo').value = '';
  renderDict();
  wsSend({ type: 'dict_update', dict: userDict });
}
function removeDict(idx) {
  userDict.splice(idx, 1);
  localStorage.setItem('speaknote_dict', JSON.stringify(userDict));
  renderDict();
  wsSend({ type: 'dict_update', dict: userDict });
}
function renderDict() {
  const list = document.getElementById('dictList');
  if (userDict.length === 0) { list.innerHTML = '<div style="color:#666; padding:6px;">辞書は空です</div>'; return; }
  list.innerHTML = userDict.map((e, i) =>
    `<div style="display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid #333;">
      <span>${e.from} → ${e.to}</span>
      <button onclick="removeDict(${i})" style="background:none; border:none; color:#e74c3c; cursor:pointer; font-size:10px;">削除</button>
    </div>`
  ).join('');
}
function applyDict(text) {
  let result = text;
  for (const entry of userDict) { result = result.split(entry.from).join(entry.to); }
  return result;
}

// --- Dictionary Learning (diff detection) ---
let pendingLearnPairs = [];

function findDiffs(raw, cleaned) {
  const pairs = [];
  const stripPunct = s => s.replace(/[。、！？!?,.\s]/g, '');
  const rawClean = stripPunct(raw);
  const cleanedClean = stripPunct(cleaned);
  if (rawClean === cleanedClean) return [];

  let i = 0, j = 0;
  while (i < rawClean.length && j < cleanedClean.length) {
    if (rawClean[i] !== cleanedClean[j]) {
      let found = false;
      for (let look = 1; look <= 10 && !found; look++) {
        if (i + look < rawClean.length && rawClean[i + look] === cleanedClean[j]) {
          pairs.push({ from: rawClean.substring(i, i + look), to: '' });
          i += look; found = true;
        } else if (j + look < cleanedClean.length && rawClean[i] === cleanedClean[j + look]) {
          pairs.push({ from: '', to: cleanedClean.substring(j, j + look) });
          j += look; found = true;
        } else if (i + look < rawClean.length && j + look < cleanedClean.length && rawClean[i + look] === cleanedClean[j + look]) {
          const oldPart = rawClean.substring(i, i + look);
          const newPart = cleanedClean.substring(j, j + look);
          if (oldPart && newPart && oldPart !== newPart) pairs.push({ from: oldPart, to: newPart });
          i += look; j += look; found = true;
        }
      }
      if (!found) { i++; j++; }
    } else { i++; j++; }
  }
  const fillers = ['えーと','あのー','あの','まあ','なんか','えー','うーん','ええと'];
  return pairs.filter(p => p.from && p.to && p.from.length >= 1 && !fillers.includes(p.from));
}

// --- WebSocket ---
function connectWS() {
  const port = location.port || '3457';
  ws = new WebSocket('ws://localhost:' + port);

  ws.onopen = () => {
    connEl.className = 'ok';
    statusEl.textContent = 'Alt=録音 / F9=トグル';
    ws.send(JSON.stringify({ type: 'debug', msg: 'Edge connected' }));
    wsSend({ type: 'setting', key: 'aiEnabled', value: aiEnabled });
    wsSend({ type: 'setting', key: 'autoLearnEnabled', value: autoLearnEnabled });
    wsSend({ type: 'dict_update', dict: userDict });
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'command') {
        const cmd = msg.command;
        if (cmd === 'start' && !isListening) startListening();
        else if (cmd === 'stop' && isListening) stopAndSend();
        else if (cmd === 'toggle') toggleRecord();
        else if (cmd === 'done') {
          btn.className = 'idle';
          showPasteHint();
        }
        else if (cmd === 'keep_done') {
          btn.className = 'idle';
          statusEl.textContent = 'Keep保存! (Ctrl+Vで貼り付け)';
          setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 3000);
        }
        else if (cmd === 'beep_stop') { /* 無効化 */ }
        else if (cmd === 'beep') { /* 無効化 */ }
        else if (cmd === 'ai_on') {
          aiEnabled = true; chkAI.checked = true;
          statusEl.textContent = 'AI整形ON';
          setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 1500);
        }
        else if (cmd === 'ai_off') {
          aiEnabled = false; chkAI.checked = false;
          statusEl.textContent = 'AI整形OFF';
          setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 1500);
        }
        else if (cmd === 'tts_done') {
          btn.className = chatMode ? 'idle chat-mode' : 'idle';
          statusEl.textContent = '会話モード: Alt=話す';
        }
        else if (cmd === 'chat_mode_on') { chatMode = true; updateChatModeUI(); }
        else if (cmd === 'chat_mode_off') { chatMode = false; stopTTS(); updateChatModeUI(); }
      } else if (msg.type === 'whisper_result') {
        // main.jsからWhisper結果を受信
        stoppingLock = false;
        if (msg.text) {
          accumulated = msg.text;
          sendAccumulated();
        } else {
          // 空テキスト → main.js の isProcessing をリセット
          wsSend({ type: 'recording_failed' });
          btn.className = chatMode ? 'idle chat-mode' : 'idle';
          statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
        }
      } else if (msg.type === 'chat_reply') {
        appendChatLog('assistant', msg.text);
        previewEl.textContent = msg.text;
        if (msg.useElevenLabs) {
          // Audio plays from main.js via PowerShell, just show UI
          btn.className = 'speaking';
          statusEl.textContent = '読み上げ中...';
        } else {
          speakTTS(msg.text);
        }
      } else if (msg.type === 'chat_error') {
        btn.className = chatMode ? 'idle chat-mode' : 'idle';
        statusEl.textContent = 'エラー: ' + (msg.error || '応答失敗');
        setTimeout(() => { statusEl.textContent = '会話モード: Alt=話す'; }, 3000);
      } else if (msg.type === 'chat_cleared') {
        // already handled in clearChat()
      } else if (msg.type === 'learn_compare') {
        // Auto-register diffs to dictionary
        if (msg.original && msg.corrected && msg.original !== msg.corrected) {
          const diffs = findDiffs(msg.original, msg.corrected);
          if (diffs.length > 0) {
            for (const pair of diffs) {
              userDict = userDict.filter(e => e.from !== pair.from);
              userDict.push(pair);
            }
            localStorage.setItem('speaknote_dict', JSON.stringify(userDict));
            wsSend({ type: 'dict_update', dict: userDict });
            const learned = diffs.map(d => d.from + '→' + d.to).join(', ');
            statusEl.textContent = '学習完了: ' + learned;
            setTimeout(() => { statusEl.textContent = 'Alt=録音 / F9=トグル'; }, 3000);
          }
        }
      } else if (msg.type === 'unprocessed_saved') {
        statusEl.textContent = '⚠️ 音声を保存しました (次回再試行可)';
        setTimeout(() => {
          statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
        }, 5000);
      } else if (msg.type === 'pasted') {
        lastResult = msg.text || '';
        updateLastOutputPanel(lastResult);
        if (msg.aiCleanFailed) {
          statusEl.textContent = '⚠️ AI整形失敗→生テキストを貼り付け';
          setTimeout(() => {
            statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
          }, 3000);
        }
      }
    } catch {}
  };

  ws.onclose = () => {
    connEl.className = '';
    statusEl.textContent = '再接続中...';
    setTimeout(connectWS, 1000);
  };
}

function wsSend(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
}

// --- 最後の出力パネル（データ消失防止UI） ---
const lastOutputEl = document.getElementById('lastOutput');
const lastOutputTextEl = document.getElementById('lastOutputText');
function updateLastOutputPanel(text) {
  if (!text || !text.trim()) return;
  lastOutputTextEl.textContent = text;
  lastOutputEl.classList.add('show');
  // localStorage にもバックアップ（次回起動時の復元に使用）
  try { localStorage.setItem('speaknote_last_output', text); } catch {}
}
function copyLastOutput() {
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult).then(() => {
    statusEl.textContent = '✓ コピーしました';
    setTimeout(() => { statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル'; }, 2000);
  }).catch(() => {
    statusEl.textContent = '⚠️ コピー失敗';
  });
}
function rePasteLastOutput() {
  if (!lastResult) return;
  // main.js に再貼り付けを依頼
  wsSend({ type: 'repaste', text: lastResult });
  statusEl.textContent = '↻ 再貼り付け中...';
  setTimeout(() => { statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル'; }, 2000);
}
// 起動時に前回の出力を復元
try {
  const saved = localStorage.getItem('speaknote_last_output');
  if (saved) {
    lastResult = saved;
    updateLastOutputPanel(saved);
  }
} catch {}

// --- Toggle ---
function toggleRecord() {
  if (isListening) stopAndSend();
  else startListening();
}

// --- Whisper録音 (MediaRecorder シンプル単発版) ---
// 録音終了時に音声を1回でWhisperへ送る確実な方式
// 注意: 5分超の録音は Vercel タイムアウトで失敗する可能性あり（短く区切ってください）
let mediaRecorder = null;
let audioChunks = [];
let mediaStream = null;
let liveRecognition = null;
let liveText = '';
let liveInterim = '';
const WHISPER_API = 'https://web-five-alpha-24.vercel.app/api/transcribe';
const WHISPER_KEY = 'speaknote-owner-pro-2026';

let recordStartTime = 0;
let recordTimer = null;

let startingLock = false;
let stoppingLock = false;

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

async function startListening() {
  if (isListening || startingLock) return;
  startingLock = true;
  isListening = true;
  stoppingLock = false;  // 重要: 前回録音の残骸クリア（これが残ると次のstopが効かない）
  stopTTS();
  playTone(880, 0.08);
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    accumulated = '';

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.start();  // タイムスライスなし=停止時に1回だけondataavailable
    recordStartTime = Date.now();
    btn.className = 'listening';
    previewEl.textContent = '🎤 録音中...';
    if (recordTimer) clearInterval(recordTimer);
    recordTimer = setInterval(() => {
      if (!isListening) return;
      const sec = (Date.now() - recordStartTime) / 1000;
      statusEl.textContent = `録音中... ${formatTime(sec)}`;
    }, 500);
    statusEl.textContent = '録音中... 0:00';
    wsSend({ type: 'debug', msg: 'MediaRecorder start OK' });
  } catch(e) {
    isListening = false;
    statusEl.textContent = '録音失敗: ' + e.message;
  }
  startingLock = false;
}

let sendGuard = false; // 二重送信防止

async function stopAndSend() {
  if (!isListening || stoppingLock) return;
  stoppingLock = true;
  isListening = false;
  playTone(660, 0.08);
  btn.className = 'processing';
  statusEl.textContent = 'Whisper文字起こし中...';
  previewEl.textContent = '';
  if (recordTimer) { clearInterval(recordTimer); recordTimer = null; }

  const rec = mediaRecorder;
  if (rec && rec.state !== 'inactive') {
    rec.onstop = async () => {
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      wsSend({ type: 'debug', msg: 'onstop fired, chunks=' + audioChunks.length });

      if (audioChunks.length === 0) {
        // 空録音 → main.js の isProcessing をリセットして idle に戻る
        wsSend({ type: 'recording_failed' });
        stoppingLock = false;
        btn.className = chatMode ? 'idle chat-mode' : 'idle';
        statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
        return;
      }

      try {
        const blob = new Blob(audioChunks, { type: rec.mimeType });
        audioChunks = [];
        const base64 = await blobToBase64(blob);
        const fmt = rec.mimeType.includes('mp4') ? 'mp4' : 'webm';

        wsSend({ type: 'debug', msg: 'Whisper送信: ' + Math.round(base64.length/1024) + 'KB' });
        wsSend({ type: 'whisper_request', audio: base64, format: fmt });
      } catch(e) {
        wsSend({ type: 'debug', msg: 'Whisper encode error: ' + e.message });
        wsSend({ type: 'recording_failed' });
        stoppingLock = false;
        btn.className = chatMode ? 'idle chat-mode' : 'idle';
        statusEl.textContent = '文字起こし失敗: ' + e.message;
        setTimeout(() => { statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル'; }, 2000);
      }
    };
    rec.stop();
  } else {
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    wsSend({ type: 'recording_failed' });
    stoppingLock = false;
    btn.className = chatMode ? 'idle chat-mode' : 'idle';
    statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
  }
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function sendAccumulated() {
  let text = accumulated;
  accumulated = '';

  if (text && text.trim()) text = applyDict(text);

  wsSend({ type: 'debug', msg: 'stop text="' + (text || '').substring(0, 50) + '"' });

  if (text && text.trim()) {
    lastResult = text;
    btn.className = 'processing';
    // 結果送信した時点で stopping 完了 → ロック解除（次の録音で確実に停止できるよう）
    stoppingLock = false;
    if (chatMode) {
      statusEl.textContent = 'AI応答中...';
      appendChatLog('user', text);
      wsSend({ type: 'chat_input', text: text });
    } else {
      statusEl.textContent = aiEnabled ? 'AI整形中...' : '出力中...';
      wsSend({ type: 'result', text: text });
    }
  } else {
    // 空テキスト時は main.js の isProcessing をリセット
    wsSend({ type: 'recording_failed' });
    stoppingLock = false;
    btn.className = chatMode ? 'idle chat-mode' : 'idle';
    statusEl.textContent = chatMode ? '会話モード: Alt=話す' : 'Alt=録音 / F9=トグル';
    previewEl.textContent = '';
  }
}

connectWS();
