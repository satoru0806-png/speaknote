<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SQL Copy</title></head>
<body style="font-family:sans-serif;padding:20px;background:#1a1a2e;color:#fff;">
<h2>このボタンを押してSQLをコピーしてください</h2>
<button onclick="copySQL()" style="background:#667eea;color:#fff;border:none;padding:20px 40px;font-size:20px;border-radius:12px;cursor:pointer;">
  SQLをコピー
</button>
<p id="status" style="margin-top:16px;color:#2ecc71;font-size:18px;"></p>
<p style="color:#888;margin-top:20px;">コピーしたら、Supabaseの<strong>SQLエディタ</strong>に貼り付けて（Ctrl+V）実行してください。</p>
<script>
function copySQL() {
  const sql = `CREATE TABLE IF NOT EXISTS profiles (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE UNIQUE NOT NULL,
  plan TEXT DEFAULT 'free' CHECK (plan IN ('free', 'lite', 'standard')),
  monthly_usage INTEGER DEFAULT 0,
  usage_reset_at TIMESTAMPTZ DEFAULT (date_trunc('month', now()) + interval '1 month'),
  stripe_customer_id TEXT,
  stripe_subscription_id TEXT,
  created_at TIMESTAMPTZ DEFAULT now(),
  updated_at TIMESTAMPTZ DEFAULT now()
);
CREATE INDEX IF NOT EXISTS idx_profiles_user_id ON profiles(user_id);
CREATE INDEX IF NOT EXISTS idx_profiles_stripe_customer ON profiles(stripe_customer_id);
ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
DO $$ BEGIN
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname = 'users_read_own' AND tablename = 'profiles') THEN
    CREATE POLICY users_read_own ON profiles FOR SELECT USING (auth.uid() = user_id);
  END IF;
END $$;
DO $$ BEGIN
  IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE policyname = 'service_manage_all' AND tablename = 'profiles') THEN
    CREATE POLICY service_manage_all ON profiles FOR ALL USING (true) WITH CHECK (true);
  END IF;
END $$;
CREATE OR REPLACE FUNCTION handle_new_user() RETURNS TRIGGER AS $$ BEGIN INSERT INTO profiles (user_id, plan, monthly_usage) VALUES (NEW.id, 'free', 0); RETURN NEW; END; $$ LANGUAGE plpgsql SECURITY DEFINER;
DROP TRIGGER IF EXISTS on_auth_user_created ON auth.users;
CREATE TRIGGER on_auth_user_created AFTER INSERT ON auth.users FOR EACH ROW EXECUTE FUNCTION handle_new_user();`;
  navigator.clipboard.writeText(sql).then(() => {
    document.getElementById('status').textContent = '✅ コピーしました！Supabaseに貼り付けてください';
  });
}
</script>
</body></html>
