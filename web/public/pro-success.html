<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アップグレード完了 | SpeakNote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 32px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.4;
      margin-bottom: 16px;
    }

    p {
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .features {
      background: #0f3460;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 32px;
      text-align: left;
    }

    .features p {
      margin-bottom: 0;
      font-size: 0.875rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      color: #c4b5fd;
      font-size: 0.875rem;
    }

    .feature-item::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #ffffff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Proプランへのアップグレード<br>ありがとうございます！</h1>
    <p>決済が完了しました。SpeakNote Proの全機能をお使いいただけます。</p>

    <div class="features">
      <div class="feature-item">AI音声整形・無制限</div>
      <div class="feature-item">高精度テキスト変換</div>
      <div class="feature-item">優先サポート</div>
    </div>

    <a href="/" class="btn">SpeakNoteに戻る</a>
  </div>
</body>
</html>
