<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakNote">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>SpeakNote</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #fff;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 40px 16px 20px;
  -webkit-user-select: none; user-select: none;
}

h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 30px; }

/* Mic button */
#mic {
  width: 100px; height: 100px; border-radius: 50%; border: none;
  color: #fff; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#mic.idle { background: linear-gradient(135deg, #667eea, #764ba2); }
#mic.idle:active { transform: scale(0.95); }
#mic.listening { background: #e74c3c; animation: pulse 1s infinite; box-shadow: 0 0 40px rgba(231,76,60,0.5); }
#mic.processing { background: #f39c12; cursor: wait; }

#status { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }

/* Result area */
#resultArea {
  margin-top: 20px; width: 100%; max-width: 400px;
  display: none; flex-direction: column; gap: 8px;
}
#resultArea.show { display: flex; }

#resultText {
  background: #16213e; border: 1px solid #333; border-radius: 12px;
  padding: 14px; font-size: 15px; line-height: 1.6; color: #eee;
  min-height: 60px; max-height: 40vh; overflow-y: auto;
  -webkit-user-select: text; user-select: text;
  word-break: break-word;
}

.btn-row { display: flex; gap: 8px; }
.btn-row button {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
#btnCopy { background: #667eea; color: #fff; }
#btnCopy:active { background: #5568d0; }
#btnCopy.copied { background: #2ecc71; }
#btnClear { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid #333; }
#btnClear:active { background: rgba(255,255,255,0.15); }

/* History */
#history { margin-top: 24px; width: 100%; max-width: 400px; }
#history h3 { font-size: 12px; color: #666; margin-bottom: 8px; }
#historyList { display: flex; flex-direction: column; gap: 6px; }
.hist-item {
  background: #16213e; border-radius: 8px; padding: 10px 12px;
  font-size: 13px; color: #aaa; line-height: 1.4;
  cursor: pointer; transition: background 0.15s;
  -webkit-user-select: text; user-select: text;
}
.hist-item:active { background: #1e2d50; }

/* Settings */
#settingsBar {
  margin-top: 20px; display: flex; align-items: center; gap: 14px;
}
.toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
.sw { position: relative; width: 36px; height: 20px; cursor: pointer; }
.sw input { display: none; }
.sw .track { position: absolute; inset: 0; background: #444; border-radius: 10px; transition: 0.2s; }
.sw .track:before {
  content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
  background: #fff; border-radius: 50%; transition: 0.2s;
}
.sw input:checked + .track { background: #667eea; }
.sw input:checked + .track:before { transform: translateX(16px); }

/* Preview (interim) */
#preview {
  margin-top: 12px; font-size: 12px; color: #666;
  max-width: 400px; text-align: center; word-break: break-all;
  min-height: 18px;
}

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

/* Pro key */
#proBtn {
  background: none; border: 1px solid #555; color: #888; font-size: 11px;
  padding: 4px 10px; border-radius: 12px; cursor: pointer;
}
#proBtn.active { border-color: #667eea; color: #667eea; }
#proModal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; align-items: center; justify-content: center;
}
#proModal.show { display: flex; }
#proModal .modal {
  background: #16213e; border-radius: 16px; padding: 28px 24px;
  max-width: 360px; width: 90%; text-align: center;
}
#proModal h2 { font-size: 16px; margin-bottom: 12px; }
#proModal input {
  width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
  background: #0a0a1a; color: #2ed573; font-family: monospace; font-size: 14px;
  margin-bottom: 12px;
}
#proModal .modal-btns { display: flex; gap: 8px; }
#proModal .modal-btns button {
  flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer;
}
#proSave { background: #667eea; color: #fff; }
#proRemove { background: #333; color: #e74c3c; }
#proCancel { background: #333; color: #aaa; }
#proPlan {
  font-size: 11px; color: #888; margin-top: 8px;
}
#proPlan.pro { color: #2ed573; }

/* Dictionary modal */
#dictModal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; align-items: center; justify-content: center;
}
#dictModal.show { display: flex; }
#dictModal .modal {
  background: #16213e; border-radius: 16px; padding: 24px 20px;
  max-width: 380px; width: 92%; max-height: 80vh; overflow-y: auto;
}
#dictModal h2 { font-size: 16px; margin-bottom: 6px; }
#dictModal .dict-desc { font-size: 11px; color: #888; margin-bottom: 14px; }
.dict-add { display: flex; gap: 6px; margin-bottom: 14px; }
.dict-add input {
  flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444;
  background: #0a0a1a; color: #eee; font-size: 13px;
}
.dict-add button {
  padding: 10px 14px; border-radius: 8px; border: none;
  background: #667eea; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap;
}
#dictList { display: flex; flex-direction: column; gap: 4px; }
.dict-item {
  display: flex; justify-content: space-between; align-items: center;
  background: #0f1b35; border-radius: 8px; padding: 8px 10px; font-size: 13px;
}
.dict-item span { color: #aaa; }
.dict-item .arrow { color: #667eea; margin: 0 6px; }
.dict-item button {
  background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; padding: 2px 6px;
}
#dictClose {
  margin-top: 14px; width: 100%; padding: 10px; border-radius: 8px;
  border: 1px solid #444; background: none; color: #aaa; font-size: 13px; cursor: pointer;
}

/* Toast */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #2ecc71; color: #fff; padding: 8px 20px; border-radius: 20px;
  font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- LINE/in-app browser warning -->
<div id="inappWarning" style="display:none; text-align:center; padding:40px 20px;">
  <h1 style="margin-bottom:12px;">SpeakNote</h1>
  <p style="color:#aaa; font-size:14px; margin-bottom:20px; line-height:1.6;">
    このアプリはChromeまたはSafariで<br>開く必要があります
  </p>
  <a id="openExternal" href="" style="display:inline-block; background:#667eea; color:#fff; padding:14px 30px; border-radius:12px; text-decoration:none; font-size:15px; font-weight:500;">

  </a>
  <p style="color:#666; font-size:11px; margin-top:16px; line-height:1.6;">

  </p>
</div>

<!-- Main app -->
<div id="mainApp">
<h1>SpeakNote</h1>
<p class="subtitle">タップして話すだけ</p>

<button id="mic" class="idle" onclick="toggleRecord()">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
    <line x1="12" x2="12" y1="19" y2="22"/>
  </svg>
</button>

<div id="status">マイクをタップして録音開始</div>
<div id="preview"></div>

<div id="settingsBar">
  <div class="toggle-wrap">
    AI整形
    <label class="sw"><input type="checkbox" id="chkAI" checked><span class="track"></span></label>
  </div>
  <button id="dictBtn" onclick="openDictModal()" style="background:none; border:1px solid #555; color:#888; font-size:11px; padding:4px 10px; border-radius:12px; cursor:pointer;">辞書</button>
  <button id="proBtn" onclick="openProModal()">Pro</button>
</div>
<div id="proPlan"></div>

<!-- Pro key modal -->
<div id="proModal">
  <div class="modal">
    <h2>Proキーを入力</h2>
    <p style="color:#888; font-size:12px; margin-bottom:16px;">決済完了後に表示されたProキーを貼り付けてください</p>
    <input type="text" id="proKeyInput" placeholder="cus_xxxxxxxxxxxx">
    <div class="modal-btns">
      <button id="proCancel" onclick="closeProModal()">閉じる</button>
      <button id="proRemove" onclick="removeProKey()">解除</button>
      <button id="proSave" onclick="saveProKey()">保存</button>
    </div>
    <button id="manageSubBtn" onclick="openPortal()" style="display:none; margin-top:12px; width:100%; background:none; border:1px solid #555; color:#888; padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">サブスク管理（解約・カード変更）</button>
  </div>
</div>

<!-- Dictionary modal -->
<div id="dictModal">
  <div class="modal">
    <h2>辞書（名前登録）</h2>

</div>

<div id="resultArea">
  <div id="resultText"></div>
  <div class="btn-row">
    <button id="btnUndo" style="display:none; background:#f39c12; color:#fff; border-radius:8px; padding:10px 16px; font-size:14px; border:none;" ontouchend="toggleOriginal(); event.preventDefault();" onclick="toggleOriginal()">元の文章に戻す</button>
    <button id="btnCopy" ontouchend="copyResult(); event.preventDefault();" onclick="copyResult()">コピー</button>
    <button id="btnClear" ontouchend="clearResult(); event.preventDefault();" onclick="clearResult()">クリア</button>
  </div>
</div>

<div id="history">
  <h3>履歴</h3>
  <div id="historyList"></div>
</div>

<div id="toast">コピーしました</div>

<div style="margin-top:40px; padding-top:16px; border-top:1px solid #333; text-align:center; width:100%; max-width:400px;">

<script>
// --- In-app browser detection ---
(function() {
  const ua = navigator.userAgent || '';
  const isLine = /Line\//i.test(ua);
  const isFB = /FBAN|FBAV/i.test(ua);
  const isInsta = /Instagram/i.test(ua);
  const isTwitter = /Twitter/i.test(ua);
  const isInApp = isLine || isFB || isInsta || isTwitter;

  if (isInApp) {
    document.getElementById('inappWarning').style.display = 'block';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('openExternal').href = location.href;

    // LINE: intent URL to open in external browser
    if (isLine) {
      document.getElementById('openExternal').href =
        'https://line.me/R/oaMessage/@line?text=' + encodeURIComponent(location.href);
      // Alternative: direct intent
      const url = location.href;
      document.getElementById('openExternal').href = url;
      document.getElementById('openExternal').onclick = function(e) {
        e.preventDefault();
        // Try to open in default browser via intent (Android)
        if (/Android/i.test(ua)) {
          location.href = 'intent://' + url.replace(/^https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;end';
        } else {
          // iOS: guide user to use Safari
          window.open(url, '_system');
        }
      };
    }
  }
})();
</script>

<script>
const mic = document.getElementById('mic');
const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const resultArea = document.getElementById('resultArea');
const resultText = document.getElementById('resultText');
const btnCopy = document.getElementById('btnCopy');
const chkAI = document.getElementById('chkAI');
const toast = document.getElementById('toast');

let rec = null;
let isListening = false;
let accumulated = '';
let history = JSON.parse(localStorage.getItem('speaknote_history') || '[]');
let proKey = localStorage.getItem('speaknote_pro_key') || '';
let userDict = JSON.parse(localStorage.getItem('speaknote_dict') || '[]');

// --- Dictionary ---
function openDictModal() {
  renderDictList();
  document.getElementById('dictModal').classList.add('show');
}
function closeDictModal() {
  document.getElementById('dictModal').classList.remove('show');
}
function addDictEntry() {
  const from = document.getElementById('dictFrom').value.trim();
  const to = document.getElementById('dictTo').value.trim();
  if (!from || !to) return;
  userDict = userDict.filter(e => e.from !== from);
  userDict.push({ from, to });
  localStorage.setItem('speaknote_dict', JSON.stringify(userDict));
  document.getElementById('dictFrom').value = '';
  document.getElementById('dictTo').value = '';
  renderDictList();
  showToast('辞書に追加しました');
}
function removeDictEntry(idx) {
  userDict.splice(idx, 1);
  localStorage.setItem('speaknote_dict', JSON.stringify(userDict));
  renderDictList();
}
function renderDictList() {
  const list = document.getElementById('dictList');
  if (userDict.length === 0) {
    list.innerHTML = '<div style="color:#555; font-size:12px; padding:8px;">辞書は空です</div>';
    return;
  }
  list.innerHTML = userDict.map((e, i) =>
    `<div class="dict-item"><span>${e.from}<span class="arrow">→</span>${e.to}</span><button onclick="removeDictEntry(${i})">✕</button></div>`
  ).join('');
}
function applyDict(text) {
  for (const entry of userDict) {
    text = text.split(entry.from).join(entry.to);
  }
  return text;
}
function getDictNames() {
  if (userDict.length === 0) return null;
  return userDict.map(e => e.to);
}

// URLパラメータからProキーを自動設定（テスター向け簡単設定）
// 使い方: https://web-five-alpha-24.vercel.app/?key=speaknote-vip-001-xxxxx
(function autoSetKeyFromUrl() {
  try {
    const urlKey = new URLSearchParams(window.location.search).get('key');
    if (urlKey) {
      proKey = urlKey.trim();
      localStorage.setItem('speaknote_pro_key', proKey);
      // URLからkeyパラメータを削除（画面をクリーンに）
      const url = new URL(window.location.href);
      url.searchParams.delete('key');
      window.history.replaceState({}, '', url.toString());
      // 設定完了をユーザーに通知
      setTimeout(() => {
        if (typeof showToast === 'function') showToast('Pro設定完了！');
        else alert('Pro設定が完了しました！');
      }, 500);
    }
  } catch (e) {}
})();

// Whisper用: MediaRecorder
let mediaRecorder = null;
let audioChunks = [];
let mediaStream = null;

renderHistory();
updateProUI();

// --- Audio feedback ---
let audioCtx = null;
function playTone(freq, dur) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  gain.gain.value = 0.3;
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function playStart() { playTone(880, 0.1); }
function playStop() { playTone(600, 0.15); }

// --- Toggle ---
function toggleRecord() {
  if (isListening) stopAndSend();
  else startListening();
}

// --- Speech Recognition ---
function startListening() {
  // Proユーザー: Whisper API（MediaRecorder）を使用
  if (proKey) {
    startWhisperRecording();
    return;
  }

  // 無料ユーザー: ブラウザSpeechRecognition
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    statusEl.textContent = 'このブラウザは音声認識に対応していません。Chromeをお使いください。';
    return;
  }

  if (rec) { try { rec.onend = null; rec.abort(); } catch(e) {} rec = null; }

  accumulated = '';
  rec = new SR();
  rec.lang = 'ja-JP';
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  rec.continuous = !isSafari;
  rec.interimResults = true;

  rec.onresult = (e) => {
    let finals = '', interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finals += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    accumulated = finals + interim;
    previewEl.textContent = accumulated;
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      statusEl.textContent = 'マイクの許可が必要です';
    } else if (e.error !== 'aborted') {
      statusEl.textContent = 'エラー: ' + e.error;
    }
    if (e.error !== 'aborted') { isListening = false; mic.className = 'idle'; }
  };

  rec.onend = () => {
    if (isListening && rec) {
      try { rec.start(); } catch(e) { isListening = false; mic.className = 'idle'; }
    }
  };

  try {
    rec.start();
    isListening = true;
    mic.className = 'listening';
    statusEl.textContent = '録音中... もう一度タップで完了';
    previewEl.textContent = '';
    playStart();
  } catch(e) {
    statusEl.textContent = '録音開始できません: ' + e.message;
  }
}

// --- Whisper録音（Pro専用） ---
async function startWhisperRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // WebM優先、非対応ならMP4
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.start(1000); // 1秒ごとにチャンク
    isListening = true;
    mic.className = 'listening';
    statusEl.textContent = '録音中(Whisper)... もう一度タップで完了';
    previewEl.textContent = '🎤 高品質録音中...';
    playStart();
  } catch(e) {
    statusEl.textContent = 'マイクの許可が必要です: ' + e.message;
  }
}

async function stopAndSend() {
  isListening = false;
  playStop();

  // Whisper録音中の場合
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mic.className = 'processing';
    statusEl.textContent = 'Whisper文字起こし中...';
    previewEl.textContent = '';

    mediaRecorder.onstop = async () => {
      // マイクストリーム解放
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

      if (audioChunks.length === 0) {
        mic.className = 'idle';
        statusEl.textContent = 'テキストなし。もう一度お試しください。';
        setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 2000);
        return;
      }

      const mimeType = mediaRecorder.mimeType;
      const blob = new Blob(audioChunks, { type: mimeType });
      audioChunks = [];
      mediaRecorder = null;

      try {
        // Blob → base64
        const base64 = await blobToBase64(blob);
        const format = mimeType.includes('mp4') ? 'mp4' : 'webm';

        // Whisper API呼び出し
        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': proKey },
          body: JSON.stringify({ audio: base64, format }),
        });
        const data = await res.json();
        const text = data.text || '';

        if (!text.trim()) {
          mic.className = 'idle';
          statusEl.textContent = 'テキストなし。もう一度お試しください。';
          setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 2000);
          return;
        }

        // 辞書置換（方法B）
        const dictApplied = applyDict(text);
        // AI整形
        if (chkAI.checked) {
          statusEl.textContent = 'AI整形中...';
          try {
            const body = { text: dictApplied };
            const names = getDictNames();
            if (names) body.names = names;
            const cleanRes = await fetch('/api/clean', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-api-key': proKey },
              body: JSON.stringify(body),
            });
            const cleanData = await cleanRes.json();
            showResult(cleanData.cleaned || dictApplied, text);
          } catch(e) {
            showResult(dictApplied, text);
          }
        } else {
          showResult(dictApplied, text);
        }
      } catch(e) {
        mic.className = 'idle';
        statusEl.textContent = 'Whisperエラー: ' + e.message;
        setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 3000);
      }
    };

    mediaRecorder.stop();
    return;
  }

  // ブラウザSpeechRecognitionの場合
  const text = accumulated;
  accumulated = '';

  if (rec) { rec.onend = null; try { rec.stop(); } catch(e) {} rec = null; }
  previewEl.textContent = '';

  if (!text || !text.trim()) {
    mic.className = 'idle';
    statusEl.textContent = 'テキストなし。もう一度お試しください。';
    setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 2000);
    return;
  }

  // 辞書置換（方法B）
  const dictApplied = applyDict(text);
  // AI cleanup
  if (chkAI.checked) {
    mic.className = 'processing';
    statusEl.textContent = 'AI整形中...';
    try {
      const headers = { 'Content-Type': 'application/json' };
      if (proKey) headers['x-api-key'] = proKey;
      const body = { text: dictApplied };
      const names = getDictNames();
      if (names) body.names = names;
      const res = await fetch('/api/clean', {
        method: 'POST',
        headers,
        body: JSON.stringify(body),
      });
      const data = await res.json();
      showResult(data.cleaned || dictApplied, text);
    } catch(e) {
      showResult(dictApplied, text);
    }
  } else {
    showResult(dictApplied, text);
  }
}

// base64変換ユーティリティ
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

let originalText = ''; // 整形前のテキスト保持
let isShowingOriginal = false;

function showResult(text, rawText) {
  mic.className = 'idle';
  statusEl.textContent = 'マイクをタップして録音開始';
  resultText.textContent = text;
  originalText = rawText || '';
  isShowingOriginal = false;
  resultArea.style.display = 'flex'; resultArea.classList.add('show');

  // 元に戻すボタンの表示制御
  const undoBtn = document.getElementById('btnUndo');
  if (undoBtn) {
    undoBtn.style.display = (originalText && originalText !== text) ? 'inline-block' : 'none';
    undoBtn.textContent = '元の文章に戻す';
  }

  // Add to history
  history.unshift({ text, time: Date.now() });
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('speaknote_history', JSON.stringify(history));
  renderHistory();
}

// --- Copy ---
async function copyResult() {
  const text = resultText.textContent;
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
    btnCopy.textContent = 'コピー済み';
    btnCopy.className = 'copied';
    showToast();
    setTimeout(() => { btnCopy.textContent = 'コピー'; btnCopy.className = ''; }, 1500);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  }
}

function toggleOriginal() {
  const undoBtn = document.getElementById('btnUndo');
  if (isShowingOriginal) {
    // 整形後に戻す
    const cleanedText = undoBtn.dataset.cleaned;
    resultText.textContent = cleanedText;
    undoBtn.textContent = '元の文章に戻す';
    isShowingOriginal = false;
  } else {
    // 元の文章を表示
    undoBtn.dataset.cleaned = resultText.textContent;
    resultText.textContent = originalText;
    undoBtn.textContent = '整形した文章に戻す';
    isShowingOriginal = true;
  }
}

function clearResult() {
  resultArea.style.display = 'none';
  resultArea.classList.remove('show');
  resultText.textContent = '';
  originalText = '';
  isShowingOriginal = false;
}

function showToast(msg) {
  if (msg) toast.textContent = msg;
  else toast.textContent = 'コピーしました';
  toast.className = 'show';
  setTimeout(() => { toast.className = ''; }, 1500);
}

// --- History ---
function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div style="color:#555; font-size:12px;">まだ履歴がありません</div>';
    return;
  }
  list.innerHTML = history.slice(0, 10).map((h, i) => {
    const preview = h.text.length > 60 ? h.text.substring(0, 60) + '...' : h.text;
    const time = new Date(h.time).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    return `<div class="hist-item" onclick="useHistory(${i})"><span style="color:#555; font-size:10px;">${time}</span> ${preview}</div>`;
  }).join('');
}

function useHistory(idx) {
  const item = history[idx];
  if (item) {
    resultText.textContent = item.text;
    resultArea.style.display = 'flex'; resultArea.classList.add('show');
  }
}

// --- Pro Key ---
function updateProUI() {
  const btn = document.getElementById('proBtn');
  const plan = document.getElementById('proPlan');
  if (proKey) {
    btn.className = 'active';
    btn.textContent = 'Pro ✓';
    plan.textContent = 'Proプラン有効';
    plan.className = 'pro';
  } else {
    btn.className = '';
    btn.textContent = 'Pro';
    plan.textContent = '';
    plan.className = '';
  }
}

function openProModal() {
  document.getElementById('proKeyInput').value = proKey;
  document.getElementById('manageSubBtn').style.display = proKey ? 'block' : 'none';
  document.getElementById('proModal').classList.add('show');
}

async function openPortal() {
  if (!proKey) return;
  try {
    const res = await fetch('/api/portal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': proKey },
    });
    const data = await res.json();
    if (data.url) {
      window.open(data.url, '_blank');
    } else {
      showToast('ポータルを開けませんでした');
    }
  } catch (e) {
    showToast('通信エラー');
  }
}

function closeProModal() {
  document.getElementById('proModal').classList.remove('show');
}

function saveProKey() {
  const key = document.getElementById('proKeyInput').value.trim();
  if (!key) return;
  proKey = key;
  localStorage.setItem('speaknote_pro_key', proKey);
  updateProUI();
  closeProModal();
  showToast('Proキーを保存しました');
}

function removeProKey() {
  proKey = '';
  localStorage.removeItem('speaknote_pro_key');
  document.getElementById('proKeyInput').value = '';
  updateProUI();
  closeProModal();
  showToast('Proキーを解除しました');
}

// --- Service Worker (PWA) ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
