<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeakNote">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<title>SpeakNote</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #1a1a2e; color: #fff;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 40px 16px 20px;
  -webkit-user-select: none; user-select: none;
}

h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 30px; }

/* Mic button */
#mic {
  width: 100px; height: 100px; border-radius: 50%; border: none;
  color: #fff; cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#mic.idle { background: linear-gradient(135deg, #667eea, #764ba2); }
#mic.idle:active { transform: scale(0.95); }
#mic.listening { background: #e74c3c; animation: pulse 1s infinite; box-shadow: 0 0 40px rgba(231,76,60,0.5); }
#mic.processing { background: #f39c12; cursor: wait; }

#status { margin-top: 16px; font-size: 13px; color: #888; text-align: center; }

/* Result area */
#resultArea {
  margin-top: 20px; width: 100%; max-width: 400px;
  display: none; flex-direction: column; gap: 8px;
}
#resultArea.show { display: flex; }

#resultText {
  background: #16213e; border: 1px solid #333; border-radius: 12px;
  padding: 14px; font-size: 15px; line-height: 1.6; color: #eee;
  min-height: 60px; max-height: 40vh; overflow-y: auto;
  -webkit-user-select: text; user-select: text;
  word-break: break-word;
}

.btn-row { display: flex; gap: 8px; }
.btn-row button {
  flex: 1; padding: 12px; border-radius: 10px; border: none;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all 0.15s; -webkit-tap-highlight-color: transparent;
}
#btnCopy { background: #667eea; color: #fff; }
#btnCopy:active { background: #5568d0; }
#btnCopy.copied { background: #2ecc71; }
#btnClear { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid #333; }
#btnClear:active { background: rgba(255,255,255,0.15); }

/* History */
#history { margin-top: 24px; width: 100%; max-width: 400px; }
#history h3 { font-size: 12px; color: #666; margin-bottom: 8px; }
#historyList { display: flex; flex-direction: column; gap: 6px; }
.hist-item {
  background: #16213e; border-radius: 8px; padding: 10px 12px;
  font-size: 13px; color: #aaa; line-height: 1.4;
  cursor: pointer; transition: background 0.15s;
  -webkit-user-select: text; user-select: text;
}
.hist-item:active { background: #1e2d50; }

/* Settings */
#settingsBar {
  margin-top: 20px; display: flex; align-items: center; gap: 14px;
}
.toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
.sw { position: relative; width: 36px; height: 20px; cursor: pointer; }
.sw input { display: none; }
.sw .track { position: absolute; inset: 0; background: #444; border-radius: 10px; transition: 0.2s; }
.sw .track:before {
  content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px;
  background: #fff; border-radius: 50%; transition: 0.2s;
}
.sw input:checked + .track { background: #667eea; }
.sw input:checked + .track:before { transform: translateX(16px); }

/* Preview (interim) */
#preview {
  margin-top: 12px; font-size: 12px; color: #666;
  max-width: 400px; text-align: center; word-break: break-all;
  min-height: 18px;
}

@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

/* Pro key */
#proBtn {
  background: none; border: 1px solid #555; color: #888; font-size: 11px;
  padding: 4px 10px; border-radius: 12px; cursor: pointer;
}
#proBtn.active { border-color: #667eea; color: #667eea; }
#proModal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; align-items: center; justify-content: center;
}
#proModal.show { display: flex; }
#proModal .modal {
  background: #16213e; border-radius: 16px; padding: 28px 24px;
  max-width: 360px; width: 90%; text-align: center;
}
#proModal h2 { font-size: 16px; margin-bottom: 12px; }
#proModal input {
  width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444;
  background: #0a0a1a; color: #2ed573; font-family: monospace; font-size: 14px;
  margin-bottom: 12px;
}
#proModal .modal-btns { display: flex; gap: 8px; }
#proModal .modal-btns button {
  flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer;
}
#proSave { background: #667eea; color: #fff; }
#proRemove { background: #333; color: #e74c3c; }
#proCancel { background: #333; color: #aaa; }
#proPlan {
  font-size: 11px; color: #888; margin-top: 8px;
}
#proPlan.pro { color: #2ed573; }

/* Dictionary modal */
#dictModal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 100; align-items: center; justify-content: center;
}
#dictModal.show { display: flex; }
#dictModal .modal {
  background: #16213e; border-radius: 16px; padding: 24px 20px;
  max-width: 380px; width: 92%; max-height: 80vh; overflow-y: auto;
}
#dictModal h2 { font-size: 16px; margin-bottom: 6px; }
#dictModal .dict-desc { font-size: 11px; color: #888; margin-bottom: 14px; }
.dict-add { display: flex; gap: 6px; margin-bottom: 14px; }
.dict-add input {
  flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444;
  background: #0a0a1a; color: #eee; font-size: 13px;
}
.dict-add button {
  padding: 10px 14px; border-radius: 8px; border: none;
  background: #667eea; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap;
}
#dictList { display: flex; flex-direction: column; gap: 4px; }
.dict-item {
  display: flex; justify-content: space-between; align-items: center;
  background: #0f1b35; border-radius: 8px; padding: 8px 10px; font-size: 13px;
}
.dict-item span { color: #aaa; }
.dict-item .arrow { color: #667eea; margin: 0 6px; }
.dict-item button {
  background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 16px; padding: 2px 6px;
}
#dictClose {
  margin-top: 14px; width: 100%; padding: 10px; border-radius: 8px;
  border: 1px solid #444; background: none; color: #aaa; font-size: 13px; cursor: pointer;
}

/* Toast */
#toast {
  position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: #2ecc71; color: #fff; padding: 8px 20px; border-radius: 20px;
  font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- Main app -->
<div id="mainApp">

<button id="mic" class="idle" onclick="toggleRecord()">
  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">

<div id="settingsBar">

    AI整形
    <label class="sw"><input type="checkbox" id="chkAI" checked><span class="track"></span></label>

</div>
<div id="proPlan"></div>

<!-- Pro key modal -->
<div id="proModal">
  <div class="modal">
    <h2>Proキーを入力</h2>
    <p style="color:#888; font-size:12px; margin-bottom:16px;">決済完了後に表示されたProキーを貼り付けてください</p>
    <input type="text" id="proKeyInput" placeholder="cus_xxxxxxxxxxxx">

      <button id="proCancel" onclick="closeProModal()">閉じる</button>
      <button id="proRemove" onclick="removeProKey()">解除</button>
      <button id="proSave" onclick="saveProKey()">保存</button>
    </div>
    <button id="manageSubBtn" onclick="openPortal()" style="display:none; margin-top:12px; width:100%; background:none; border:1px solid #555; color:#888; padding:8px; border-radius:8px; cursor:pointer; font-size:12px;">サブスク管理（解約・カード変更）</button>
  </div>
</div>

<!-- Sync modal -->
<div id="syncModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center;">
  <div style="background:#16213e; border-radius:16px; padding:24px 20px; max-width:380px; width:92%;">
    <h2 style="font-size:16px; margin-bottom:6px;">同期（辞書・メモ・履歴）</h2>
    <p id="syncStatus" style="font-size:11px; color:#888; margin-bottom:14px;">未ログイン</p>
    <div id="syncLoginForm">
      <input type="email" id="syncEmail" placeholder="メールアドレス" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#0a0a1a; color:#eee; font-size:13px; margin-bottom:8px;">
      <input type="password" id="syncPassword" placeholder="パスワード（6文字以上）" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#0a0a1a; color:#eee; font-size:13px; margin-bottom:8px;">
      <div style="display:flex; gap:6px; margin-bottom:10px;">
        <button onclick="syncLogin()" style="flex:1; padding:10px; border-radius:8px; border:none; background:#667eea; color:#fff; font-size:13px; cursor:pointer;">ログイン</button>
        <button onclick="syncSignup()" style="flex:1; padding:10px; border-radius:8px; border:none; background:#2ed573; color:#fff; font-size:13px; cursor:pointer;">新規登録</button>
      </div>
    </div>
    <div id="syncLoggedIn" style="display:none;">
      <button onclick="syncPull()" style="width:100%; padding:10px; border-radius:8px; border:none; background:#667eea; color:#fff; font-size:13px; cursor:pointer; margin-bottom:6px;">クラウドから取得</button>
      <button onclick="syncPush()" style="width:100%; padding:10px; border-radius:8px; border:none; background:#2ed573; color:#fff; font-size:13px; cursor:pointer; margin-bottom:6px;">クラウドに保存</button>
      <button onclick="syncLogout()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:none; color:#e74c3c; font-size:13px; cursor:pointer; margin-bottom:6px;">ログアウト</button>
    </div>
    <button onclick="closeSyncModal()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:none; color:#aaa; font-size:13px; cursor:pointer; margin-top:6px;">閉じる</button>
  </div>
</div>

<!-- Dictionary modal -->
<div id="dictModal">
  <div class="modal">
    <h2>辞書（名前登録）</h2>
    <p class="dict-desc">よく使う人名を登録すると、音声認識で正しく変換されます</p>
    <div class="dict-add">
      <input type="text" id="dictFrom" placeholder="読み（例: たなか）">
      <input type="text" id="dictTo" placeholder="表記（例: 田中）">
      <button onclick="addDictEntry()">追加</button>

</div>

<div id="resultArea">

</div>
</div><!-- end mainApp -->

<script>
// --- In-app browser detection ---
(function() {
  const ua = navigator.userAgent || '';
  const isLine = /Line\//i.test(ua);
  const isFB = /FBAN|FBAV/i.test(ua);
  const isInsta = /Instagram/i.test(ua);
  const isTwitter = /Twitter/i.test(ua);
  const isInApp = isLine || isFB || isInsta || isTwitter;

  if (isInApp) {
    document.getElementById('inappWarning').style.display = 'block';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('openExternal').href = location.href;

    // LINE: intent URL to open in external browser
    if (isLine) {
      document.getElementById('openExternal').href =
        'https://line.me/R/oaMessage/@line?text=' + encodeURIComponent(location.href);
      // Alternative: direct intent
      const url = location.href;
      document.getElementById('openExternal').href = url;
      document.getElementById('openExternal').onclick = function(e) {
        e.preventDefault();
        // Try to open in default browser via intent (Android)
        if (/Android/i.test(ua)) {
          location.href = 'intent://' + url.replace(/^https?:\/\//, '') +
            '#Intent;scheme=https;package=com.android.chrome;end';
        } else {
          // iOS: guide user to use Safari
          window.open(url, '_system');
        }
      };
    }
  }
})();
</script>

<script>
const mic = document.getElementById('mic');
const statusEl = document.getElementById('status');
const previewEl = document.getElementById('preview');
const resultArea = document.getElementById('resultArea');
const resultText = document.getElementById('resultText');
const btnCopy = document.getElementById('btnCopy');
const chkAI = document.getElementById('chkAI');
const toast = document.getElementById('toast');

let rec = null;
let isListening = false;
let accumulated = '';
let history = JSON.parse(localStorage.getItem('speaknote_history') || '[]');
let proKey = localStorage.getItem('speaknote_pro_key') || '';
let userDict = JSON.parse(localStorage.getItem('speaknote_dict') || '[]');
let syncToken = localStorage.getItem('speaknote_sync_token') || '';
let syncEmail = localStorage.getItem('speaknote_sync_email') || '';

// --- Sync (Cloud) ---
function openSyncModal() {
  updateSyncUI();
  document.getElementById('syncModal').style.display = 'flex';
}
function closeSyncModal() {
  document.getElementById('syncModal').style.display = 'none';
}
function updateSyncUI() {
  const status = document.getElementById('syncStatus');
  const loginForm = document.getElementById('syncLoginForm');
  const loggedIn = document.getElementById('syncLoggedIn');
  const btn = document.getElementById('syncBtn');
  if (syncToken) {
    status.textContent = 'ログイン中: ' + syncEmail;
    status.style.color = '#2ed573';
    loginForm.style.display = 'none';
    loggedIn.style.display = 'block';
    btn.style.borderColor = '#2ed573';
    btn.style.color = '#2ed573';
    btn.textContent = '同期✓';
  } else {
    status.textContent = '未ログイン（ログインすると全デバイスで同期されます）';
    status.style.color = '#888';
    loginForm.style.display = 'block';
    loggedIn.style.display = 'none';
    btn.style.borderColor = '#555';
    btn.style.color = '#888';
    btn.textContent = '同期';
  }
}

async function syncLogin() {
  const email = document.getElementById('syncEmail').value.trim();
  const password = document.getElementById('syncPassword').value;
  if (!email || !password) { showToast('メールとパスワードを入力'); return; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || 'ログイン失敗'); return; }
    syncToken = data.token;
    syncEmail = email;
    localStorage.setItem('speaknote_sync_token', syncToken);
    localStorage.setItem('speaknote_sync_email', syncEmail);
    updateSyncUI();
    showToast('ログイン成功');
    await syncPull(); // ログイン後すぐ取得
  } catch(e) { showToast('通信エラー'); }
}

async function syncSignup() {
  const email = document.getElementById('syncEmail').value.trim();
  const password = document.getElementById('syncPassword').value;
  if (!email || !password) { showToast('メールとパスワードを入力'); return; }
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.error || '登録失敗'); return; }
    showToast('登録完了！メール確認後ログインしてください');
  } catch(e) { showToast('通信エラー'); }
}

function syncLogout() {
  syncToken = '';
  syncEmail = '';
  localStorage.removeItem('speaknote_sync_token');
  localStorage.removeItem('speaknote_sync_email');
  updateSyncUI();
  showToast('ログアウトしました');
}

async function syncPull() {
  if (!syncToken) return;
  try {
    const res = await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + syncToken },
      body: JSON.stringify({ action: 'get' }),
    });
    if (res.status === 401) { syncLogout(); return; }
    const data = await res.json();
    // クラウドデータで上書き
    if (Array.isArray(data.dict)) {
      userDict = data.dict;
      localStorage.setItem('speaknote_dict', JSON.stringify(userDict)); autoSyncPush();
    }
    if (Array.isArray(data.memos)) {
      localStorage.setItem('speaknote_memos', JSON.stringify(data.memos));
    }
    if (Array.isArray(data.history)) {
      history = data.history;
      localStorage.setItem('speaknote_history', JSON.stringify(history));
      renderHistory();
    }
    showToast('クラウドから取得しました');
  } catch(e) { showToast('取得エラー'); }
}

async function syncPush() {
  if (!syncToken) return;
  try {
    const payload = {
      dict: userDict,
      memos: JSON.parse(localStorage.getItem('speaknote_memos') || '[]'),
      history: history,
      settings: { aiEnabled: chkAI.checked },
    };
    const res = await fetch('/api/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + syncToken },
      body: JSON.stringify({ action: 'put', data: payload }),
    });
    if (res.status === 401) { syncLogout(); return; }
    if (!res.ok) { showToast('保存エラー'); return; }
    showToast('クラウドに保存しました');
  } catch(e) { showToast('保存エラー'); }
}

// データ更新時に自動でクラウドpush（デバウンス）
let _syncDebounce = null;
function autoSyncPush() {
  if (!syncToken) return;
  if (_syncDebounce) clearTimeout(_syncDebounce);
  _syncDebounce = setTimeout(() => syncPush(), 3000);
}


// --- Dictionary ---
function openDictModal() {
  renderDictList();
  document.getElementById('dictModal').classList.add('show');
}
function closeDictModal() {
  document.getElementById('dictModal').classList.remove('show');
}
function addDictEntry() {
  const from = document.getElementById('dictFrom').value.trim();
  const to = document.getElementById('dictTo').value.trim();
  if (!from || !to) return;
  userDict = userDict.filter(e => e.from !== from);
  userDict.push({ from, to });
  localStorage.setItem('speaknote_dict', JSON.stringify(userDict)); autoSyncPush();
  document.getElementById('dictFrom').value = '';
  document.getElementById('dictTo').value = '';
  renderDictList();
  showToast('辞書に追加しました');
}
function removeDictEntry(idx) {

function renderDictList() {

  ).join('');
}
function applyDict(text) {
  for (const entry of userDict) {
    text = text.split(entry.from).join(entry.to);
  }
  return text;
}
function getDictNames() {
  if (userDict.length === 0) return null;
  return userDict.map(e => e.to);
}

// --- VAD (Voice Activity Detection) - 声を検出して自動録音 ---
let vadStream = null;
let vadCtx = null;
let vadAnimFrame = null;
let vadActive = false;

async function startVAD() {
  if (vadActive) return;
  try {
    vadStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    vadCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = vadCtx.createMediaStreamSource(vadStream);
    const analyser = vadCtx.createAnalyser();
    analyser.fftSize = 512;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    vadActive = true;
    statusEl.textContent = '🎧 声を待機中...（話しかけてください）';
    const THRESHOLD = 30;   // 音量閾値
    let aboveCount = 0;
    const check = () => {
      if (!vadActive) return;
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      const avg = sum / data.length;
      if (avg > THRESHOLD) {
        aboveCount++;
        if (aboveCount > 3) { // 連続3フレーム（約50ms）超えたら録音開始
          stopVAD();
          toggleRecord();
          return;
        }
      } else {
        aboveCount = 0;
      }
      vadAnimFrame = requestAnimationFrame(check);
    };
    check();
  } catch(e) {
    statusEl.textContent = 'マイク許可が必要です';
    vadActive = false;
  }
}

function stopVAD() {
  vadActive = false;
  if (vadAnimFrame) { cancelAnimationFrame(vadAnimFrame); vadAnimFrame = null; }
  if (vadStream) { vadStream.getTracks().forEach(t => t.stop()); vadStream = null; }
  if (vadCtx) { try { vadCtx.close(); } catch(e) {} vadCtx = null; }
}

function toggleVAD() {
  const btn = document.getElementById('vadBtn');
  if (vadActive) {
    stopVAD();
    btn.style.borderColor = '#555';
    btn.style.color = '#888';
    btn.textContent = '🎧ハンズフリー';
    statusEl.textContent = 'マイクをタップして録音開始';
  } else {
    btn.style.borderColor = '#2ed573';
    btn.style.color = '#2ed573';
    btn.textContent = '🎧ON';
    startVAD();
  }
}

// --- Streaming AI clean ---
async function streamClean(inputText, rawText, apiKey) {
  const body = { text: inputText };
  const names = getDictNames();
  if (names) body.names = names;
  const headers = { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' };
  if (apiKey) headers['x-api-key'] = apiKey;

  // 結果表示を先に出す（空で）
  resultText.textContent = '';
  originalText = rawText || '';
  isShowingOriginal = false;
  resultArea.style.display = 'flex'; resultArea.classList.add('show');
  mic.className = 'idle';
  statusEl.textContent = '';

  try {
    const res = await fetch('/api/clean', { method: 'POST', headers, body: JSON.stringify(body) });
    if (!res.body || !res.headers.get('content-type')?.includes('text/event-stream')) {
      // ストリーミング非対応 → 通常処理
      const data = await res.json();
      showResult(data.cleaned || inputText, rawText);
      return;
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta?.content || '';
          if (delta) { full += delta; resultText.textContent = full; }
        } catch {}
      }
    }
    if (!full.trim()) full = inputText;
    showResult(full.trim(), rawText);
  } catch(e) {
    showResult(inputText, rawText);
  }
}

// --- Audio feedback ---
let audioCtx = null;
function playTone(freq, dur) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  gain.gain.value = 0.3;
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}
function playStart() { playTone(880, 0.1); }
function playStop() { playTone(600, 0.15); }

// --- Toggle ---
function toggleRecord() {
  if (isListening) stopAndSend();
  else startListening();
}

// --- Speech Recognition ---
function startListening() {
  // Proユーザー: Whisper API（MediaRecorder）を使用
  if (proKey) {
    startWhisperRecording();
    return;
  }

  // 無料ユーザー: ブラウザSpeechRecognition
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    statusEl.textContent = 'このブラウザは音声認識に対応していません。Chromeをお使いください。';
    return;
  }

  if (rec) { try { rec.onend = null; rec.abort(); } catch(e) {} rec = null; }

  accumulated = '';
  rec = new SR();
  rec.lang = 'ja-JP';
  const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  rec.continuous = !isSafari;
  rec.interimResults = true;

  rec.onresult = (e) => {
    let finals = '', interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finals += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    accumulated = finals + interim;
    previewEl.textContent = accumulated;
  };

  rec.onerror = (e) => {
    if (e.error === 'not-allowed') {
      statusEl.textContent = 'マイクの許可が必要です';
    } else if (e.error !== 'aborted') {
      statusEl.textContent = 'エラー: ' + e.error;
    }
    if (e.error !== 'aborted') { isListening = false; mic.className = 'idle'; }
  };

  rec.onend = () => {
    if (isListening && rec) {
      try { rec.start(); } catch(e) { isListening = false; mic.className = 'idle'; }
    }
  };

  try {
    rec.start();
    isListening = true;
    mic.className = 'listening';
    statusEl.textContent = '録音中... もう一度タップで完了';
    previewEl.textContent = '';
    playStart();
  } catch(e) {
    statusEl.textContent = '録音開始できません: ' + e.message;
  }
}

// --- Whisper録音（Pro専用） ---
async function startWhisperRecording() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];

    // WebM優先、非対応ならMP4
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/mp4';
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.start(1000); // 1秒ごとにチャンク
    isListening = true;
    mic.className = 'listening';
    statusEl.textContent = '録音中(Whisper)... もう一度タップで完了';
    previewEl.textContent = '🎤 高品質録音中...';
    playStart();
  } catch(e) {
    statusEl.textContent = 'マイクの許可が必要です: ' + e.message;
  }
}

async function stopAndSend() {
  isListening = false;
  playStop();

  // Whisper録音中の場合
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mic.className = 'processing';
    statusEl.textContent = 'Whisper文字起こし中...';
    previewEl.textContent = '';

    mediaRecorder.onstop = async () => {
      // マイクストリーム解放
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

      if (audioChunks.length === 0) {
        mic.className = 'idle';
        statusEl.textContent = 'テキストなし。もう一度お試しください。';
        setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 2000);
        return;
      }

      const mimeType = mediaRecorder.mimeType;
      const blob = new Blob(audioChunks, { type: mimeType });
      audioChunks = [];
      mediaRecorder = null;

      try {
        // Blob → base64
        const base64 = await blobToBase64(blob);
        const format = mimeType.includes('mp4') ? 'mp4' : 'webm';

        // Whisper API呼び出し
        const res = await fetch('/api/transcribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': proKey },
          body: JSON.stringify({ audio: base64, format }),
        });
        const data = await res.json();
        const text = data.text || '';

        if (!text.trim()) {
          mic.className = 'idle';
          statusEl.textContent = 'テキストなし。もう一度お試しください。';
          setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 2000);
          return;
        }

        // 辞書置換（方法B）
        const dictApplied = applyDict(text);
        // AI整形（ストリーミング）
        if (chkAI.checked) {
          statusEl.textContent = 'AI整形中...';
          await streamClean(dictApplied, text, proKey);
        } else {
          showResult(dictApplied, text);
        }
      } catch(e) {
        mic.className = 'idle';
        statusEl.textContent = 'Whisperエラー: ' + e.message;
        setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 3000);
      }
    };

    mediaRecorder.stop();
    return;
  }

  // ブラウザSpeechRecognitionの場合
  const text = accumulated;
  accumulated = '';

  if (rec) { rec.onend = null; try { rec.stop(); } catch(e) {} rec = null; }
  previewEl.textContent = '';

  if (!text || !text.trim()) {
    mic.className = 'idle';
    statusEl.textContent = 'テキストなし。もう一度お試しください。';
    setTimeout(() => { statusEl.textContent = 'マイクをタップして録音開始'; }, 2000);
    return;
  }

  // 辞書置換（方法B）
  const dictApplied = applyDict(text);
  // AI cleanup（ストリーミング）
  if (chkAI.checked) {
    mic.className = 'processing';
    statusEl.textContent = 'AI整形中...';
    await streamClean(dictApplied, text, proKey);
  } else {
    showResult(dictApplied, text);
  }
}

// base64変換ユーティリティ
function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// --- Voice (TTS) ---
function speak(text) {
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ja-JP';
    u.rate = 1.1;
    u.onend = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

// --- Intent Detection (Phase 2) ---
function detectIntent(rawText) {
  if (!rawText) return { type: 'copy', target: null, name: null };
  const t = rawText;
  // 送信先の名前を検出（「〇〇さんに」パターン）
  const nameMatch = t.match(/(.{1,10}?)さんに/);
  const name = nameMatch ? nameMatch[1] : null;
  // 意図検出
  if (/送って|送りたい|伝えて|連絡して|LINEして|ラインして/.test(t)) {
    if (/メール/.test(t)) return { type: 'mail', target: 'mail', name };
    return { type: 'line', target: 'line', name };
  }
  if (/メールして|メールで/.test(t)) return { type: 'mail', target: 'mail', name };
  if (/メモ|保存|覚えて|記録/.test(t)) return { type: 'memo', target: 'memo', name: null };
  return { type: 'copy', target: null, name };
}

// --- 確認音声認識（「はい」「やめて」を聞く） ---
function listenForConfirmation() {
  return new Promise((resolve) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { resolve('timeout'); return; }
    const rec = new SR();
    rec.lang = 'ja-JP';
    rec.continuous = false;
    rec.interimResults = false;
    let settled = false;
    const finish = (result) => {
      if (settled) return;
      settled = true;
      try { rec.stop(); } catch(e) {}
      resolve(result);
    };
    rec.onresult = (e) => {
      const t = e.results[0]?.[0]?.transcript || '';
      if (/はい|うん|オーケー|オッケー|いいよ|送って|ok/i.test(t)) finish('yes');
      else if (/いいえ|やめ|キャンセル|ちがう|違う|だめ/.test(t)) finish('no');
      else finish('unclear');
    };
    rec.onerror = () => finish('timeout');
    rec.onend = () => { if (!settled) finish('timeout'); };
    try { rec.start(); } catch(e) { finish('timeout'); }
    // 5秒で自動タイムアウト
    setTimeout(() => finish('timeout'), 5000);
  });
}

// 意図に基づく自動アクション
async function handleIntent(cleanedText, rawText) {
  const intent = detectIntent(rawText);

  if (intent.type === 'line' || intent.type === 'mail') {
    const who = intent.name ? intent.name + 'さん' : '相手';
    const channel = intent.type === 'line' ? 'LINE' : 'メール';
    // 確認の読み上げ
    await speak(who + 'に' + channel + 'で送ります。よろしいですか？');
    // 「はい」を待つ
    const answer = await listenForConfirmation();
    if (answer === 'yes') {
      await speak('送ります。');
      if (intent.type === 'line') sendToLine();
      else sendToMail();
    } else if (answer === 'no') {
      await speak('キャンセルしました。');
    } else {
      // タイムアウト or 不明: 画面を開くだけ（ユーザー判断）
      await speak('画面を開きます。');
      if (intent.type === 'line') sendToLine();
      else sendToMail();
    }
  } else if (intent.type === 'memo') {
    saveMemo();
    await speak('メモに保存しました。');
  } else {
    // 通常モード：整形結果を読み上げ
    await speak(cleanedText);
  }
  // VAD有効なら再び待機モードへ
  resumeVADIfActive();
}

function saveMemo() {

  let memos = JSON.parse(localStorage.getItem('speaknote_memos') || '[]');
  memos.unshift({ text, time: Date.now() });
  if (memos.length > 100) memos = memos.slice(0, 100);
  localStorage.setItem('speaknote_memos', JSON.stringify(memos));
  autoSyncPush();
  showToast('メモに保存しました');
}

function sendToLine() {
  const text = resultText.textContent;
  if (!text) return;

  window.open(url, '_blank');

function sendToMail() {
  const text = resultText.textContent;
  if (!text) return;
  const subject = text.substring(0, 30) + (text.length > 30 ? '...' : '');
  window.location.href = 'mailto:?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(text);
}

function showToast(msg) {
  if (msg) toast.textContent = msg;
  else toast.textContent = 'コピーしました';

  try {
    const res = await fetch('/api/portal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': proKey },
    });
    const data = await res.json();
    if (data.url) {
      window.open(data.url, '_blank');
    } else {
      showToast('ポータルを開けませんでした');
    }
  } catch (e) {
    showToast('通信エラー');
  }
}

function closeProModal() {
  document.getElementById('proModal').classList.remove('show');
}

function saveProKey() {
  const key = document.getElementById('proKeyInput').value.trim();
  if (!key) return;
  proKey = key;
  localStorage.setItem('speaknote_pro_key', proKey);
  updateProUI();
  closeProModal();
  showToast('Proキーを保存しました');
}

function removeProKey() {
  proKey = '';
  localStorage.removeItem('speaknote_pro_key');
  document.getElementById('proKeyInput').value = '';
  updateProUI();
  closeProModal();
  showToast('Proキーを解除しました');
}

// --- Service Worker (self-destruct mode) ---
// 既存のSWを登録解除させてキャッシュ問題を根絶
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
  // 既存のSWが残っていたら解除（念のため）
  navigator.serviceWorker.getRegistrations?.().then(regs => {
    // 何もしない：sw.js自体がactivate時にunregisterするので任せる
  });
}
</script>
